    <rect x="84" y="94" width="232" height="190" rx="16" fill="url(#panel)"/>
    <rect x="84" y="94" width="232" height="34" rx="16" fill="#0d1628"/>
    <circle cx="106" cy="111" r="5" fill="#f87171"/>
    <circle cx="124" cy="111" r="5" fill="#fbbf24"/>
    <circle cx="142" cy="111" r="5" fill="#34d399"/>
    <text x="200" y="116" font-family="Sora, Inter, sans-serif" font-size="12" font-weight="700" fill="#9fb0c7" text-anchor="middle">portfolio.dev</text>

    <g font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="700">
      <text x="106" y="154" fill="#818cf8">const</text>
      <text x="150" y="154" fill="#e8eef7">developer</text>
      <text x="226" y="154" fill="#9fb0c7">=</text>
      <text x="244" y="154" fill="#2dd4bf">{</text>

      <text x="122" y="182" fill="#38bdf8">skills:</text>
      <text x="184" y="182" fill="#e8eef7">[React, Node]</text>
      <text x="122" y="210" fill="#38bdf8">focus:</text>
      <text x="176" y="210" fill="#e8eef7">'clean code'</text>
      <text x="122" y="238" fill="#38bdf8">build:</text>
      <text x="176" y="238" fill="#e8eef7">ship()</text>
      <text x="244" y="266" fill="#2dd4bf">}</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="46" y="318" width="184" height="96" rx="18" fill="#0b1120" stroke="#22334f" stroke-width="2"/>
    <rect x="62" y="338" width="56" height="8" rx="4" fill="url(#accent)"/>
    <rect x="62" y="360" width="136" height="7" rx="3.5" fill="#21324f"/>
    <rect x="62" y="380" width="104" height="7" rx="3.5" fill="#21324f"/>
    <text x="62" y="402" font-family="Consolas, 'Courier New', monospace" font-size="14" font-weight="700" fill="#2dd4bf">$ npm run build</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="252" y="314" width="98" height="74" rx="18" fill="#111a2e" stroke="#1d2c49"/>
    <path d="M285 350l-16-14 16-14" fill="none" stroke="#38bdf8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M317 322l16 14-16 14" fill="none" stroke="#2dd4bf" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M306 318l-12 38" fill="none" stroke="#818cf8" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="84" cy="218" r="30" fill="#111a2e" stroke="#1d2c49"/>
    <text x="84" y="228" font-family="Sora, Inter, sans-serif" font-size="29" font-weight="800" fill="#38bdf8" text-anchor="middle">{ }</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="322" cy="220" r="30" fill="#111a2e" stroke="#1d2c49"/>
    <path d="M308 222h28M322 208v28" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g opacity="0.7">
    <rect x="96" y="446" width="208" height="8" rx="4" fill="#18243d"/>
    <rect x="144" y="446" width="112" height="8" rx="4" fill="url(#accent2)"/>
