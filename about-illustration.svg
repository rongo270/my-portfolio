<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Programming workspace illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1426"/>
      <stop offset="1" stop-color="#070b16"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111a2e"/>
      <stop offset="1" stop-color="#141f36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="400" height="500" rx="24" fill="url(#bg)"/>
  <circle cx="318" cy="76" r="92" fill="#38bdf8" opacity="0.18" filter="url(#soft)"/>
  <circle cx="72" cy="426" r="104" fill="#2dd4bf" opacity="0.15" filter="url(#soft)"/>

  <g stroke="#9fb0c7" stroke-width="1" opacity="0.18" fill="none">
    <path d="M48 92h54c14 0 20 8 20 20v18"/>
    <path d="M310 392h-42c-15 0-24-9-24-24v-22"/>
    <path d="M52 358h46c16 0 24-8 24-24v-24"/>
    <path d="M332 142h-38c-16 0-24 8-24 24v18"/>
  </g>

  <g fill="#9fb0c7" opacity="0.16">
    <circle cx="48" cy="92" r="3"/><circle cx="122" cy="130" r="3"/>
    <circle cx="332" cy="142" r="3"/><circle cx="270" cy="184" r="3"/>
    <circle cx="52" cy="358" r="3"/><circle cx="122" cy="310" r="3"/>
    <circle cx="310" cy="392" r="3"/><circle cx="244" cy="346" r="3"/>
  </g>

  <g filter="url(#shadow)">
